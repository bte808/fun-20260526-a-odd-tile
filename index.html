<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Odd Tile Sprint</title>
    <meta
      name="description"
      content="A fast daily visual puzzle: spot the one tile that breaks the generated pattern."
    >
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css?v=20260531">
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-labelledby="game-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Daily visual sprint</p>
            <h1 id="game-title">Odd Tile Sprint</h1>
          </div>
          <button class="icon-button" id="restart" type="button" aria-label="Restart sprint" title="Restart">
            <span aria-hidden="true">↻</span>
          </button>
        </div>

        <div class="hud" aria-label="Sprint status">
          <div class="metric">
            <span class="metric-label">Round</span>
            <strong id="round">1/6</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Time</span>
            <strong id="time">18.0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Misses</span>
            <strong id="misses">0/3</strong>
          </div>
        </div>

        <p class="prompt" id="prompt">Find the single tile that breaks the pattern.</p>

        <div class="board-wrap">
          <div id="board" class="board" aria-label="Odd tile board"></div>
        </div>

        <div class="feedback" id="feedback" role="status" aria-live="polite">
          Study the board. First tap starts the timer.
        </div>

        <div class="actions">
          <button id="new-round" type="button">New Daily Sprint</button>
          <button id="contrast-toggle" type="button" aria-pressed="false">High Contrast</button>
          <button id="copy-score" type="button">Copy Result</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=20260531"></script>
  </body>
</html>
